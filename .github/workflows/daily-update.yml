name: Daily Vulnerability Update

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual triggering
  push:
    branches: [ main, master ]
    paths:
      - 'scripts/**'
      - '.github/workflows/daily-update.yml'

jobs:
  update-vulnerabilities:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Check for new vulnerabilities from OSV
      id: check-updates
      run: |
        python scripts/check_osv_updates.py
        echo "has_updates=$?" >> $GITHUB_OUTPUT

    - name: Import failed OSS-Fuzz vulnerabilities
      run: |
        # Check for any failed bisection vulnerabilities that need manual import
        python scripts/import_failed_vulns.py

    - name: Validate vulnerability files
      run: |
        python scripts/validate_vulns.py

    - name: Create pull request for updates
      if: steps.check-updates.outputs.has_updates == '0'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "auto: update vulnerability database"
        title: "Daily vulnerability database update"
        body: |
          🤖 **Automated vulnerability database update**
          
          This PR contains:
          - New vulnerabilities from OSV
          - Updated affected versions and commit ranges
          - Any failed bisection imports that were resolved
          
          The changes have been automatically validated against the OSV schema.
          
          ---
          
          *This PR was created by the daily update workflow.*
        branch: auto-update
        delete-branch: true

    - name: Summary
      run: |
        if [ "${{ steps.check-updates.outputs.has_updates }}" == "0" ]; then
          echo "✅ Updates found and PR created"
        else
          echo "ℹ️ No new updates found"
        fi
